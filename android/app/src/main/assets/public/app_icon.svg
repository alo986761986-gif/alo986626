<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background subtle gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#12121a" />
      <stop offset="100%" stop-color="#050508" />
    </radialGradient>

    <!-- Main pink-purple-blue gradient for letter 'b' -->
    <linearGradient id="bGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2a85" />
      <stop offset="50%" stop-color="#bf2aff" />
      <stop offset="100%" stop-color="#2ad5ff" />
    </linearGradient>

    <!-- Purple-to-blue gradient for audio bars -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bf2aff" />
      <stop offset="100%" stop-color="#2ad5ff" />
    </linearGradient>

    <!-- Glossy reflection overlay -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Elegant Squircle Container (Standard iOS & Android adaptive boundary) -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bgGrad)" stroke="#1a1a26" stroke-width="3" />
  
  <!-- Subtle inner border for depth -->
  <rect x="18" y="18" width="476" height="476" rx="102" fill="none" stroke="url(#glossGrad)" stroke-width="2" />

  <!-- 4 Rounded Music Visualizer Audio Bars (Left side) -->
  <!-- Bar 1 (Leftmost, shortest) -->
  <rect x="120" y="210" width="16" height="70" rx="8" fill="url(#barGrad)" />
  <!-- Bar 2 -->
  <rect x="148" y="175" width="16" height="140" rx="8" fill="url(#barGrad)" />
  <!-- Bar 3 -->
  <rect x="176" y="140" width="16" height="210" rx="8" fill="url(#barGrad)" />
  <!-- Bar 4 (Rightmost, tallest) -->
  <rect x="204" y="105" width="16" height="280" rx="8" fill="url(#barGrad)" />

  <!-- The Iconic 'b' Shape -->
  <!-- Stem -->
  <path d="M 240,132.5 A 22.5,22.5 0 0,1 285,132.5 L 285,245 L 240,245 Z" fill="url(#bGrad)" />
  <!-- Circular Loop of the 'b' -->
  <circle cx="325" cy="245" r="85" fill="url(#bGrad)" />
  <!-- Inner Loop Cutout (Dark circle) -->
  <circle cx="325" cy="245" r="45" fill="#050508" />

  <!-- White Play Button Triangle inside Loop -->
  <polygon points="317,227 317,263 347,245" fill="#ffffff" />

  <!-- Wordmark 'Beatfy' centered at the bottom -->
  <text x="256" y="435" text-anchor="middle" font-family="'Inter', -apple-system, system-ui, sans-serif" font-weight="900" font-size="52" letter-spacing="-1.5">
    <tspan fill="#ffffff">Beat</tspan>
    <tspan fill="url(#bGrad)">fy</tspan>
  </text>
</svg>
